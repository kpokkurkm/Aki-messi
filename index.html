<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akimessi - El Genio del Fútbol</title>
    <link rel="stylesheet" href="estilos.css">
    <link href="https://fonts.googleapis.com/css2?family=Squada+One&display=swap" rel="stylesheet">
</head>
<body>

    <!-- PANTALLA 1: MENÚ DE INICIO -->
    <div id="pantalla-inicio" class="contenedor-inicio">
        <div class="encabezado-inicio">
            <h1 class="titulo-principal">AKI<span>MESSI</span></h1>
            <div class="badge-subtitulo">⚽ EL GENIO DEL FÚTBOL ⚽</div>
        </div>

        <div class="portada-personaje">
            <img src="img/messi.png" alt="Akimessi El Genio" class="messi-portada">
        </div>

        <div class="contenedor-menu">
            <button id="btn-entrenamiento" class="btn-menu btn-rojo">ENTRENAMIENTO</button>
            <button id="btn-estrella" class="btn-menu btn-oro">ESTRELLA MUNDIAL</button>
            <button id="btn-logros" class="btn-menu btn-azul">LOGROS</button>
        </div>
    </div>

    <!-- PANTALLA 2: PANTALLA DE JUEGO -->
    <div id="pantalla-juego" class="contenedor-juego oculto">
        <div class="campo-futbol">
            <div class="linea-medio"></div>
        </div>

        <div id="contador-preguntas" class="marcador-superior">PREGUNTA Nº 1</div>

        <div class="personaje-contenedor">
            <!-- Bocadillo de charla para las preguntas -->
            <div id="bocadillo-charla" class="bocadillo-charla">
                <p id="texto-pregunta">Cargando la magia...</p>
            </div>

            <!-- Contenedor independiente para la Carta FUT al adivinar -->
            <div id="contenedor-carta-fut" class="contenedor-carta-fut oculto"></div>

            <div class="genio-contenedor">
                <img id="imagen-messi" src="img/messi.png" alt="Akimessi">
            </div>
        </div>

        <div class="botones-contenedor">
            <div class="fila-botones">
                <button class="btn btn-si" onclick="responder(1)">SÍ</button>
                <button class="btn btn-no" onclick="responder(0)">NO</button>
            </div>
            <button class="btn btn-nose" onclick="responder(-1)">NO LO SÉ</button>
        </div>
    </div>

    <!-- PANTALLA 3: ÁLBUM Y LOGROS -->
    <div id="pantalla-logros" class="contenedor-logros oculto">
        <h2 class="titulo-logros">ÁLBUM DE CRACKS</h2>

        <div class="caja-contenido-logros">
            <div class="stats-logros">
                <p>🔥 Racha actual: <span id="racha-consecutivas" class="font-oro">0</span> victorias</p>
                <p>🎴 Jugadores en Álbum: <span id="total-capturados" class="font-oro">0</span></p>
                <p>🏆 Rango: <span id="rango-texto" class="font-oro">Torrejón de Ardoz</span></p>
            </div>

            <hr class="linea-separadora">

            <h3 class="subtitulo-logros">Escudos Desbloqueados</h3>
            <div class="grid-logos">
                <div class="item-logo"><img id="logo-1" src="img/logos/logo1.png" class="logo-club oscurecido" alt="Escudo 1"><span class="req-victorias">1</span></div>
                <div class="item-logo"><img id="logo-2" src="img/logos/logo2.png" class="logo-club oscurecido" alt="Escudo 2"><span class="req-victorias">11</span></div>
                <div class="item-logo"><img id="logo-3" src="img/logos/logo3.png" class="logo-club oscurecido" alt="Escudo 3"><span class="req-victorias">21</span></div>
                <div class="item-logo"><img id="logo-4" src="img/logos/logo4.png" class="logo-club oscurecido" alt="Escudo 4"><span class="req-victorias">31</span></div>
                <div class="item-logo"><img id="logo-5" src="img/logos/logo5.png" class="logo-club oscurecido" alt="Escudo 5"><span class="req-victorias">41</span></div>
                <div class="item-logo"><img id="logo-6" src="img/logos/logo6.png" class="logo-club oscurecido" alt="Escudo 6"><span class="req-victorias">51</span></div>
                <div class="item-logo"><img id="logo-7" src="img/logos/logo7.png" class="logo-club oscurecido" alt="Escudo 7"><span class="req-victorias">61</span></div>
                <div class="item-logo"><img id="logo-8" src="img/logos/logo8.png" class="logo-club oscurecido" alt="Escudo 8"><span class="req-victorias">71</span></div>
                <div class="item-logo"><img id="logo-9" src="img/logos/logo9.png" class="logo-club oscurecido" alt="Escudo 9"><span class="req-victorias">81</span></div>
                <div class="item-logo"><img id="logo-10" src="img/logos/logo10.png" class="logo-club oscurecido" alt="Escudo 10"><span class="req-victorias">91</span></div>
            </div>
        </div>

        <button id="btn-volver" class="btn-menu btn-rojo">VOLVER AL MENÚ</button>
    </div>

    <!-- AUDIO DE FONDO -->
    <audio id="musica-fondo" loop>
        <audio src="audio/parado_no_bailao.mp3"></audio>
    </audio>

    <script src="juego.js"></script>
</body>
</html>
