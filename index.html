<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akimessi - El Genio del Fútbol</title>
    
    <!-- Evita el error 404 del favicon mientras no tengas el ícono -->
    <link rel="icon" href="data:,">
    
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <!-- Logos de fondo decorativos -->
    <div class="decoracion-logos">
        <img src="img/logos/equipo1.png" class="logo-bg logo1" alt="Logo">
        <img src="img/logos/equipo2.svg" class="logo-bg logo2" alt="Logo">
        <img src="img/logos/equipo3.svg" class="logo-bg logo3" alt="Logo">
        <img src="img/logos/equipo4.svg" class="logo-bg logo4" alt="Logo">
        <img src="img/logos/equipo5.svg" class="logo-bg logo5" alt="Logo">
        <img src="img/logos/equipo6.svg" class="logo-bg logo6" alt="Logo">
        <img src="img/logos/equipo7.svg" class="logo-bg logo7" alt="Logo">
        <img src="img/logos/equipo8.svg" class="logo-bg logo8" alt="Logo">
        <img src="img/logos/equipo9.svg" class="logo-bg logo9" alt="Logo">
        <img src="img/logos/equipo10.svg" class="logo-bg logo10" alt="Logo">
    </div>

    <div class="contenedor-juego">
        
        <!-- Header con Banner -->
        <header class="encabezado">
            <h1 class="titulo-juego">AKIMESSI</h1>
            <p class="subtitulo">EL GENIO DEL FÚTBOL</p>
        </header>

        <!-- Personaje (Messi) -->
        <div class="personaje-contenedor">
            <img id="messi-img" src="img/messi_genio.png" alt="Akimessi">
        </div>

        <!-- Pantalla de Inicio / Menú -->
        <div id="pantalla-inicio" class="tarjeta-menu">
            <button class="btn btn-modo" onclick="iniciarJuego('entrenamiento')">ENTRENAMIENTO</button>
            <button class="btn btn-modo btn-destacado" onclick="iniciarJuego('estrella')">ESTRELLA MUNDIAL</button>
            <button class="btn btn-modo" onclick="abrirLogros()">LOGROS</button>
        </div>

        <!-- Pantalla de Preguntas -->
        <div id="pantalla-juego" class="tarjeta-pregunta oculto">
            <div class="contador-pregunta">
                <span id="numero-pregunta">PREGUNTA N° 1</span>
            </div>
            
            <div class="caja-pregunta">
                <p id="texto-pregunta">Cargando pregunta...</p>
            </div>

            <div class="opciones-respuesta">
                <button class="btn btn-respuesta btn-si" onclick="responder(1)">SÍ</button>
                <button class="btn btn-respuesta btn-no" onclick="responder(0)">NO</button>
                <button class="btn btn-respuesta btn-nsnc" onclick="responder(-1)">NO LO SÉ</button>
            </div>
        </div>

        <!-- Pantalla de Resultado / Adivinanza Final -->
        <div id="pantalla-resultado" class="tarjeta-resultado oculto">
            <h2 id="titulo-resultado">¡YA SÉ EN QUIÉN PIENSAS!</h2>
            <div class="carta-fut">
                <div class="carta-nombre" id="nombre-jugador-adivinado">LEO MESSI</div>
            </div>
            <div class="acciones-resultado">
                <button class="btn btn-si" onclick="confirmarAdivinanza(true)">¡ACERTASTE!</button>
                <button class="btn btn-no" onclick="confirmarAdivinanza(false)">NO ES ÉL</button>
            </div>
        </div>

    </div>

    <script src="juego.js"></script>
</body>
</html>
