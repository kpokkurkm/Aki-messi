<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Qué adivinás, bobo?</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <!-- Elemento de audio con la ruta relativa correcta para GitHub -->
    <audio id="musica-fondo" src="audio/parado_no_bailao.mp3" loop></audio>

    <!-- PANTALLA DE INICIO (El Boceto) -->
    <div id="pantalla-inicio" class="contenedor-inicio">
        <div class="contenedor-menu">
            <button id="btn-entrenamiento" class="btn-menu btn-rojo">ENTRENAMIENTO</button>
            <button id="btn-estrella" class="btn-menu btn-oro">ESTRELLA MUNDIAL</button>
            <button id="btn-logros" class="btn-menu btn-azul">LOGROS</button>
        </div>
    </div>

    <!-- PANTALLA DE LOGROS -->
    <div id="pantalla-logros" class="contenedor-logros oculto">
        <h2 class="titulo-logros">Tus Logros</h2>
        <div id="lista-logros" class="lista-logros">
            <!-- Se poblará dinámicamente desde JS -->
        </div>
        <button id="btn-volver" class="btn-menu btn-azul" style="margin-top: 20px;">VOLVER AL MENÚ</button>
    </div>

    <!-- PANTALLA DEL JUEGO (Oculta al inicio) -->
    <div id="pantalla-juego" class="contenedor-juego oculto">
        <!-- Marcador superior corregido con ID -->
        <div id="marcador-superior" class="marcador-superior">
            <span id="contador-preguntas">Pregunta Nº 1</span>
        </div>

        <!-- Campo de fútbol de fondo -->
        <div class="campo-futbol">
            <div class="linea-medio"></div>
        </div>

        <!-- Contenedor del Genio y su Bocadillo -->
        <div class="personaje-contenedor">
            <div class="bocadillo-charla" id="bocadillo">
                <!-- ID texto-pregunta coincide con el JS -->
                <p id="texto-pregunta">¡Hola! Pensá en un futbolista... ¿Qué adivinás, bobo?</p>
            </div>
            <img src="img/messi_genio.png" id="imagen-messi" alt="AkiMessi Genio">
        </div>

        <!-- Panel de botones -->
        <div class="botones-contenedor">
            <div class="fila-botones">
                <button class="btn btn-si" onclick="responder(1)">SÍ</button>
                <button class="btn btn-no" onclick="responder(0)">NO</button>
            </div>
            <div class="fila-unika">
                <button class="btn btn-nose" onclick="responder(-1)">NO LO SÉ</button>
            </div>
        </div>
    </div>

    <script src="juego.js"></script>
</body>
</html>
