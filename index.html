<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Qué adivinás, bobo?</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <!-- Elemento de audio con la ruta relativa correcta para GitHub -->
    <audio id="musica-fondo" src="audio/parado_no_bailao.mp3" loop></audio>

    <!-- PANTALLA DE INICIO (El Boceto) -->
    <div id="pantalla-inicio" class="contenedor-inicio">
        <div class="contenedor-menu">
            <button id="btn-entrenamiento" class="btn-menu btn-rojo">ENTRENAMIENTO</button>
            <button id="btn-estrella" class="btn-menu btn-oro">ESTRELLA MUNDIAL</button>
            <button id="btn-logros" class="btn-menu btn-azul">LOGROS</button>
        </div>
    </div>

    <!-- PANTALLA DE LOGROS (Actualizada con Grid y Estilo Retro) -->
    <div id="pantalla-logros" class="contenedor-logros oculto">
        <h2 class="titulo-logros">TUS LOGROS</h2>
        
        <!-- Caja negra estirada -->
        <div class="caja-contenido-logros">
            <div class="stats-logros">
                <p><strong>Racha actual:</strong> <span id="racha-consecutivas">0</span> victorias consecutivas</p>
                <p><strong>Total futbolistas capturados:</strong> <span id="total-capturados">0</span></p>
                <p><strong>Rango actual:</strong> <span id="rango-texto">Principiante (0-10)</span></p>
            </div>

            <hr class="linea-separadora">

            <!-- Sección de Fichajes / Recompensas -->
            <h3 class="subtitulo-logros">HISTORIAL DE FICHAJES</h3>
            <div class="grid-logos">
                <!-- Los 10 equipos por los que fichas. JS les quitará la clase 'oscurecido' al desbloquearlos -->
                <div class="item-logo"><img src="img/logos/equipo1.png" id="logo-1" class="logo-club oscurecido" alt="Club 1"><span class="req-victorias">1 v.</span></div>
                <div class="item-logo"><img src="img/logos/equipo2.png" id="logo-2" class="logo-club oscurecido" alt="Club 2"><span class="req-victorias">2 v.</span></div>
                <div class="item-logo"><img src="img/logos/equipo3.png" id="logo-3" class="logo-club oscurecido" alt="Club 3"><span class="req-victorias">3 v.</span></div>
                <div class="item-logo"><img src="img/logos/equipo4.png" id="logo-4" class="logo-club oscurecido" alt="Club 4"><span class="req-victorias">5 v.</span></div>
                <div class="item-logo"><img src="img/logos/equipo5.png" id="logo-5" class="logo-club oscurecido" alt="Club 5"><span class="req-victorias font-oro">7 v.</span></div>
                <div class="item-logo"><img src="img/logos/equipo6.png" id="logo-6" class="logo-club oscurecido" alt="Club 6"><span class="req-victorias">10 v.</span></div>
                <div class="item-logo"><img src="img/logos/equipo7.png" id="logo-7" class="logo-club oscurecido" alt="Club 7"><span class="req-victorias">15 v.</span></div>
                <div class="item-logo"><img src="img/logos/equipo8.png" id="logo-8" class="logo-club oscurecido" alt="Club 8"><span class="req-victorias">20 v.</span></div>
                <div class="item-logo"><img src="img/logos/equipo9.png" id="logo-9" class="logo-club oscurecido" alt="Club 9"><span class="req-victorias">25 v.</span></div>
                <div class="item-logo"><img src="img/logos/equipo10.png" id="logo-10" class="logo-club oscurecido" alt="Club 10"><span class="req-victorias font-oro">50 v.</span></div>
            </div>
        </div>
        
        <button id="btn-volver" class="btn-menu btn-azul">VOLVER AL MENÚ</button>
    </div>

    <!-- PANTALLA DEL JUEGO -->
    <div id="pantalla-juego" class="contenedor-juego oculto">
        <div id="marcador-superior" class="marcador-superior">
            <span id="contador-preguntas">Pregunta Nº 1</span>
        </div>

        <!-- Campo de fútbol de fondo -->
        <div class="campo-futbol">
            <div class="linea-medio"></div>
        </div>

        <!-- Contenedor del Genio y su Bocadillo -->
        <div class="personaje-contenedor">
            <div class="bocadillo-charla" id="bocadillo">
                <p id="texto-pregunta">¡Hola! Pensá en un futbolista... ¿Qué adivinás, bobo?</p>
            </div>
            <img src="img/messi_genio.png" id="imagen-messi" alt="AkiMessi Genio">
        </div>

        <!-- Panel de botones -->
        <div class="botones-contenedor">
            <div class="fila-botones">
                <button class="btn btn-si" onclick="responder(1)">SÍ</button>
                <button class="btn btn-no" onclick="responder(0)">NO</button>
            </div>
            <div class="fila-unika">
                <button class="btn btn-nose" onclick="responder(-1)">NO LO SÉ</button>
            </div>
        </div>
    </div>

    <script src="juego.js"></script>
</body>
</html>
